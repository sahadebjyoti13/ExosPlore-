name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-mechanics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest
      - name: Run pipeline mechanics tests
        run: python -m pytest tests/ -v
